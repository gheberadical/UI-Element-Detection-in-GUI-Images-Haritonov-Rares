# YOLOv8n on GenGUI's native 13-class taxonomy.
# Trained locally on the 1650 Ti. ~35-45 min.

name: yolov8n_gengui_gengui13
model: yolov8n
dataset: gengui
taxonomy: gengui13
results_dir: results_v2

epochs: 200             # more classes -> more iterations to converge
batch: 8                # GenGUI is dense; batch=16 OOMs on 4 GB
imgsz: 640
lr0: 0.01
seed: 42
device: "0"
workers: 2
amp: true
extra:
  patience: 40
  mosaic: 1.0
  hsv_h: 0.0
  hsv_s: 0.2
  hsv_v: 0.3

wandb_project: uidet-thesis
wandb_entity: null
wandb_tags: []
