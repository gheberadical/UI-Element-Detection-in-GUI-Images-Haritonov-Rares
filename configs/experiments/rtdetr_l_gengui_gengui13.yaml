# RT-DETR-L on GenGUI's native 13-class taxonomy.
# Won't fit on 4 GB local; run on Kaggle T4 (16 GB).
# See notebooks/02_kaggle_train_rtdetr.ipynb -- set EXPERIMENT to this filename's stem.

name: rtdetr_l_gengui_gengui13
model: rtdetr_l
dataset: gengui
taxonomy: gengui13
results_dir: results_v2

epochs: 120             # more classes + transformer head -> more iterations
batch: 8
imgsz: 640
lr0: 0.0001
seed: 42
device: "0"
workers: 4
amp: true
extra:
  patience: 30
  cos_lr: true

wandb_project: uidet-thesis
wandb_entity: null
wandb_tags: []
