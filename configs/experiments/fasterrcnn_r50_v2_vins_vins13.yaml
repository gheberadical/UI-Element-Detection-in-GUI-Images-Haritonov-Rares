# Trained locally on the 1650 Ti.

name: fasterrcnn_r50_v2_vins_vins13
model: fasterrcnn_r50_v2
dataset: vins
taxonomy: vins13
results_dir: results_v2

epochs: 50
batch: 2
imgsz: 640
lr0: 0.0001
seed: 42
device: "0"
workers: 2
amp: false              # GTX 1650 Ti gives NaN losses with AMP in F-RCNN
extra:
  min_size: 480
  max_size: 800
  accumulate: 8         # effective batch = 16
  warmup_iters: 400
  weight_decay: 0.0005
  patience: 8
  min_epochs: 5
  coco_eval_every: 3      # VINS val set is large; skip COCO eval on most epochs

wandb_project: uidet-thesis
wandb_entity: null
wandb_tags: []
